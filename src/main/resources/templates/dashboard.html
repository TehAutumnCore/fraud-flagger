<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8"/>
    <title>Dashboard — Fraud Flagger</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/dashboard}">
        <div class="brand-icon">
            <svg width="14" height="16" viewBox="0 0 14 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M7 0L0 3v5c0 4.418 2.985 7.5 7 8 4.015-.5 7-3.582 7-8V3L7 0z" fill="white"/>
            </svg>
        </div>
        <span class="brand-name">Fraud Flagger <span class="brand-lite">Lite</span></span>
    </a>
    <ul class="navbar-nav">
        <li><a th:href="@{/dashboard}" class="active">Dashboard</a></li>
        <li><a th:href="@{/transactions/submit}">Submit Transaction</a></li>
        <li sec:authorize="hasAnyRole('MANAGER','ADMIN')">
            <a th:href="@{/audit-log}">Audit Log</a>
        </li>
    </ul>
    <div class="navbar-right">
        <span class="navbar-user">
            Signed in as <span sec:authentication="name">user</span>
        </span>
        <form th:action="@{/logout}" method="post" style="margin:0;">
            <button type="submit" class="btn-logout">Sign Out</button>
        </form>
    </div>
</nav>

<div class="page-wrapper">
    <div class="page-header">
        <div>
            <div class="page-title">Flagged Transactions</div>
            <div class="page-subtitle">Real-time fraud detection alerts</div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="card-header-title">Active Flags</span>
            <span class="card-header-count" th:text="${flags.size()} + ' flags'">0 flags</span>
        </div>
        <table class="data-table">
            <thead>
            <tr>
                <th>Flag ID</th>
                <th>Txn ID</th>
                <th>Account</th>
                <th>Amount</th>
                <th>Risk Score</th>
                <th>Rules Triggered</th>
                <th>Status</th>
                <th>Flagged At</th>
                <th sec:authorize="hasAnyRole('MANAGER','ADMIN')">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${flags.isEmpty()}">
                <td colspan="9" class="empty-state">No flagged transactions.</td>
            </tr>
            <tr th:each="flag : ${flags}">
                <td class="mono" th:text="${flag.id}"></td>
                <td class="mono" th:text="${flag.transaction.id}"></td>
                <td class="mono" th:text="${flag.transaction.account.accountNumber}"></td>
                <td class="amount"
                    th:text="${'$' + #numbers.formatDecimal(flag.transaction.amount, 1, 'COMMA', 2, 'POINT')}"></td>

                <td>
                        <span th:if="${flag.riskScore < 30}"
                              class="risk-badge risk-low"
                              th:text="${flag.riskScore}"></span>
                    <span th:if="${flag.riskScore >= 30 and flag.riskScore < 70}"
                          class="risk-badge risk-medium"
                          th:text="${flag.riskScore}"></span>
                    <span th:if="${flag.riskScore >= 70}"
                          class="risk-badge risk-high"
                          th:text="${flag.riskScore}"></span>
                </td>

                <td>
                    <span class="rule-tag" th:text="${flag.triggeredRules}"></span>
                </td>

                <td>
                        <span th:class="${'status-badge status-' + flag.status.toLowerCase()}"
                              th:text="${flag.status}"></span>
                </td>

                <td class="mono"
                    th:text="${#temporals.format(flag.flaggedAt, 'MMM dd, yyyy hh:mm a')}"></td>

                <td sec:authorize="hasAnyRole('MANAGER','ADMIN')">
                    <form th:action="@{/flags/{id}/approve(id=${flag.id})}"
                          method="post" style="display:inline;">
                        <button type="submit" class="btn-approve">Approve</button>
                    </form>
                    <form th:action="@{/flags/{id}/dismiss(id=${flag.id})}"
                          method="post" style="display:inline;">
                        <button type="submit" class="btn-dismiss">Dismiss</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
