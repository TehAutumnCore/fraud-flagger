<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Sign In — Fraud Flagger</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-icon">
                <svg width="16" height="18" viewBox="0 0 14 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M7 0L0 3v5c0 4.418 2.985 7.5 7 8 4.015-.5 7-3.582 7-8V3L7 0z" fill="white"/>
                </svg>
            </div>
            <h1>Fraud Flagger <span style="font-weight:300;color:#94a3b8;">Lite</span></h1>
            <p>Internal Transaction Monitoring System</p>
        </div>

        <div th:if="${param.error}" class="alert alert-error">
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            You have been signed out.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input class="form-control" type="text" id="username"
                       name="username" placeholder="Enter username" required/>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" type="password" id="password"
                       name="password" placeholder="Enter password" required/>
            </div>
            <button type="submit" class="btn-primary">Sign In</button>
        </form>
    </div>
</div>

</body>
</html>
