<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8"/>
    <title>Submit Transaction — Fraud Flagger</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/dashboard}">
        <div class="brand-icon">
            <svg width="14" height="16" viewBox="0 0 14 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M7 0L0 3v5c0 4.418 2.985 7.5 7 8 4.015-.5 7-3.582 7-8V3L7 0z" fill="white"/>
            </svg>
        </div>
        <span class="brand-name">Fraud Flagger <span class="brand-lite">Lite</span></span>
    </a>
    <ul class="navbar-nav">
        <li><a th:href="@{/dashboard}">Dashboard</a></li>
        <li><a th:href="@{/transactions/submit}" class="active">Submit Transaction</a></li>
        <li sec:authorize="hasAnyRole('MANAGER','ADMIN')">
            <a th:href="@{/audit-log}">Audit Log</a>
        </li>
    </ul>
    <div class="navbar-right">
        <span class="navbar-user">
            Signed in as <span sec:authentication="name">user</span>
        </span>
        <form th:action="@{/logout}" method="post" style="margin:0;">
            <button type="submit" class="btn-logout">Sign Out</button>
        </form>
    </div>
</nav>

<div class="page-wrapper">
    <div class="page-header">
        <div>
            <div class="page-title">Submit Transaction</div>
            <div class="page-subtitle">Transaction will be evaluated by the fraud rules engine immediately</div>
        </div>
    </div>

    <div class="form-card">
        <form th:action="@{/transactions/submit}" method="post">
            <div class="form-group">
                <label class="form-label" for="accountId">Account</label>
                <select class="form-control" id="accountId" name="accountId" required>
                    <option value="">Select an account</option>
                    <option th:each="account : ${accounts}"
                            th:value="${account.id}"
                            th:text="${account.accountNumber + ' — ' + account.ownerName}">
                    </option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label" for="amount">Amount ($)</label>
                <input class="form-control" type="number" id="amount"
                       name="amount" step="0.01" min="0.01"
                       placeholder="0.00" required/>
            </div>
            <div class="form-group">
                <label class="form-label" for="merchant">Merchant</label>
                <input class="form-control" type="text" id="merchant"
                       name="merchant" placeholder="e.g. Amazon, Best Buy" required/>
            </div>
            <button type="submit" class="btn-primary">Submit Transaction</button>
        </form>
    </div>
</div>

</body>
</html>
