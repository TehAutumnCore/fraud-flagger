<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Submit Transaction</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        label { display: block; margin-top: 1rem; font-weight: bold; }
        input, select { padding: 6px; width: 300px; margin-top: 4px; }
        button { margin-top: 1.5rem; padding: 8px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        nav { margin-bottom: 1.5rem; }
        nav a { margin-right: 1rem; }
    </style>
</head>
<body>

<h1>Submit a Transaction</h1>

<nav>
    <a href="/dashboard">Dashboard</a>
    <a href="/transactions/submit">Submit Transaction</a>
</nav>

<form th:action="@{/transactions/submit}" method="post">

    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <label for="accountId">Account</label>
    <select id="accountId" name="accountId">
        <option th:each="account : ${accounts}"
                th:value="${account.id}"
                th:text="${account.accountNumber + ' — ' + account.ownerName}">
        </option>
    </select>

    <label for="amount">Amount ($)</label>
    <input type="number" id="amount" name="amount" step="0.01" min="0.01" required />

    <label for="merchant">Merchant</label>
    <input type="text" id="merchant" name="merchant" required />

    <button type="submit">Submit Transaction</button>

</form>

</body>
</html>
