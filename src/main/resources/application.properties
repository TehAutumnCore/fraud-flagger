spring.application.name=fraud-flagger

#H2 In-Memory Database - driver is used to iniitialize H2 database Engine, username sa represents system admin
spring.datasource.url = jdbc:h2:mem:frauddb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

#JPA / Hibernate - platform explicitly defines SQL dialect, ddl-auto controls how Hibernate manages database schema, show-sql used to print sql statements generated by JPA provider
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

#H2 Web Console (enabled browsing the database in browser - console gives browser UI at localhost:8080/h2-console to inspect data
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

#SQL
spring.sql.init.mode=always